<!DOCTYPE html>
<html>
<head>
    <title>Plant Communication Classification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.68), rgba(0, 45, 25, 0.78)),
                url("https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1600&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            padding: 15px;
        }

        .navbar-brand {
            font-size: 27px;
            font-weight: bold;
            color: #9affb0 !important;
        }

        .glass-card {
            background: rgba(0, 25, 15, 0.72);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 10px 40px rgba(0,0,0,0.55);
        }

        label {
            font-weight: 600;
            color: #eaffef;
            margin-bottom: 7px;
        }

        .form-control,
        .form-select {
            border-radius: 14px;
            padding: 12px;
            border: none;
            font-size: 16px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 12px #22c55e;
            border: none;
        }

        .btn-custom {
            background: linear-gradient(to right, #16a34a, #22c55e);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 38px;
            font-size: 18px;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: linear-gradient(to right, #15803d, #16a34a);
            color: white;
            transform: scale(1.04);
        }

        h1, h2, h3, h4 {
            font-weight: bold;
            text-shadow: 2px 2px 8px black;
        }

        .table {
            border-radius: 15px;
            overflow: hidden;
        }

        .table th {
            background: #14532d !important;
            color: white !important;
        }

        .table td {
            background: rgba(255,255,255,0.95) !important;
            color: black !important;
        }

        .result-box {
            background: rgba(220, 252, 231, 0.95);
            color: #052e16;
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🌿 Plant Communication AI</a>

        <div>
            {% if user.is_authenticated %}
                <a href="/form/" class="btn btn-success btn-sm me-2">Predict</a>
                <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
            {% else %}
                <a href="/login/" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="/register/" class="btn btn-success btn-sm">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
