{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-10 glass-card">

        <h2 class="text-center mb-4">
            🌿 Plant Communication Prediction
        </h2>

        <form method="POST" action="/predict/">
            {% csrf_token %}

            <div class="row">

                <!-- Leaf Vibration -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Leaf Vibration (Hz)</label>
                    <select name="leaf_vibration" class="form-select" required>
                        <option value="">Select</option>
                        <option>10</option>
                        <option>20</option>
                        <option>30</option>
                        <option>40</option>
                        <option>50</option>
                        <option>60</option>
                        <option>70</option>
                        <option>80</option>
                        <option>90</option>
                        <option>100</option>
                    </select>
                </div>

                <!-- Pollen -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Pollen Scent Complexity</label>
                    <select name="pollen_scent_complexity" class="form-select" required>
                        <option value="">Select</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                    </select>
                </div>

                <!-- Bioluminescence -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Bioluminescence Intensity</label>
                    <select name="bioluminescence_intensity" class="form-select" required>
                        <option value="">Select</option>
                        <option>50</option>
                        <option>100</option>
                        <option>150</option>
                        <option>200</option>
                        <option>250</option>
                        <option>300</option>
                        <option>350</option>
                        <option>400</option>
                    </select>
                </div>

                <!-- Root Signal -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Root Signal Strength</label>
                    <select name="root_signal_strength" class="form-select" required>
                        <option value="">Select</option>
                        <option>10</option>
                        <option>20</option>
                        <option>30</option>
                        <option>40</option>
                        <option>50</option>
                        <option>60</option>
                        <option>70</option>
                        <option>80</option>
                    </select>
                </div>

                <!-- Growth Rate -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Growth Rate (mm/day)</label>
                    <select name="growth_rate" class="form-select" required>
                        <option value="">Select</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                    </select>
                </div>

                <!-- Temperature -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ambient Temperature (°C)</label>
                    <select name="ambient_temperature" class="form-select" required>
                        <option value="">Select</option>
                        <option>15</option>
                        <option>20</option>
                        <option>25</option>
                        <option>30</option>
                        <option>35</option>
                        <option>40</option>
                    </select>
                </div>

                <!-- Soil Moisture -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Soil Moisture Level</label>
                    <select name="soil_moisture" class="form-select" required>
                        <option value="">Select</option>
                        <option>0.1</option>
                        <option>0.2</option>
                        <option>0.3</option>
                        <option>0.4</option>
                        <option>0.5</option>
                        <option>0.6</option>
                        <option>0.7</option>
                        <option>0.8</option>
                        <option>0.9</option>
                        <option>1.0</option>
                    </select>
                </div>

                <!-- Sunlight -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sunlight Exposure (Hours)</label>
                    <select name="sunlight_exposure" class="form-select" required>
                        <option value="">Select</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                        <option>8</option>
                        <option>9</option>
                        <option>10</option>
                        <option>11</option>
                        <option>12</option>
                    </select>
                </div>

                <!-- Fungus -->
                <div class="col-md-6 mb-4">
                    <label class="form-label">Symbiotic Fungus Present</label>

                    <select name="symbiotic_fungus" class="form-select" required>
                        <option value="">Select</option>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg px-5">
                    Predict Message Type
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
